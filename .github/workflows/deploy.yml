name: Deploy VoraCMS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Rsync vendor to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" vendor/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/web/voracms/vendor/

      - name: Git pull & deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /web/voracms
            echo "=== Git pull ==="
            git stash --include-untracked 2>/dev/null || true
            git pull origin main
            echo "=== Env & perms ==="
            cp .env.local .env 2>/dev/null || true
            chmod -R 777 var/cache var/log 2>/dev/null || true
            echo "=== Load env ==="
            set -a
            source .env.local 2>/dev/null || true
            set +a
            export COLUMNS=120 LINES=40
            echo "=== Deploy ==="
            php deploy.php
            echo "=== Migrations ==="
            php bin/console doctrine:migrations:migrate --env=prod --no-interaction --no-debug 2>&1
            echo "=== Cache warmup ==="
            php bin/console cache:warmup --env=prod --no-debug 2>&1 || true
            echo "=== Final perms ==="
            chmod -R 777 var/cache var/log 2>/dev/null || true
            php -r "opcache_reset();" 2>/dev/null || true
            echo "=== Deploy complete ==="

      - name: Health check (opcional)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "⚠️  SITE_URL secret not set — skipping health check"
            echo "    Set it in GitHub → Settings → Secrets → Actions → SITE_URL"
            exit 0
          fi
          sleep 5
          CLEAN_URL=$(echo "$SITE_URL" | sed 's|/$||')
          URL="${CLEAN_URL}/admin/login"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ CMS responds ($URL): $HTTP_CODE"
          else
            echo "⚠️  CMS responded ($URL): $HTTP_CODE (not 200)"
            exit 1
          fi
