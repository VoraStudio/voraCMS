name: Deploy VoraCMS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /web/voracms
            echo "=== 1. Git pull ==="
            git pull origin main
            echo "=== 2. Clean cache (physical) ==="
            chmod -R 777 var/cache/ 2>/dev/null || true
            rm -rf var/cache/prod/* 2>/dev/null || true
            echo "=== 3. Deploy script ==="
            php deploy.php
            echo "=== 4. Restore permissions ==="
            chmod -R 775 var/cache var/log 2>/dev/null || true
            # Reset OPcache
            php -r "opcache_reset();" 2>/dev/null || true
