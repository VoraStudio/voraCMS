name: Deploy VoraCMS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /web/voracms
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || true
            php bin/console cache:clear --env=prod --no-debug 2>&1 || true
            php bin/console cache:warmup --env=prod --no-debug 2>&1 || true
            php bin/console doctrine:migrations:migrate --env=prod --no-interaction --no-debug 2>&1 || true
            chmod -R 775 var/cache var/log 2>&1 || true
