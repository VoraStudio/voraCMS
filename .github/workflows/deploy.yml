name: Deploy VoraCMS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Composer install
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Rsync vendor to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" vendor/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/web/voracms/vendor/

      - name: Git pull & deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /web/voracms
            echo "=== Git pull ==="
            git reset --hard HEAD
            git pull origin main
            echo "=== Load env ==="
            set -a
            [ -f .env.local ] && source .env.local
            [ -f .env ] && source .env
            set +a
            export COLUMNS=120 LINES=40
            echo "=== Deploy ==="
            php deploy.php
            echo "=== Migrations ==="
            php bin/console doctrine:migrations:migrate --env=prod --no-interaction --no-debug 2>&1 || true
            echo "=== Permissions ==="
            chmod -R 775 var/cache var/log 2>/dev/null || true
            php -r "opcache_reset();" 2>/dev/null || true
