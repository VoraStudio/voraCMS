name: Deploy VoraCMS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /web/voracms
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || true
            # Donar permisos abans d'esborrar (evita rm fallit per owner www-data)
            chmod -R 777 var/cache/ 2>&1 || true
            # Neteja forçada de la caché (esborrar físicament + Symfony)
            rm -rf var/cache/prod/* var/cache/prod/.gitkeep 2>&1 || true
            php bin/console cache:clear --env=prod --no-debug --no-warmup 2>&1 || true
            php bin/console cache:warmup --env=prod --no-debug 2>&1 || true
            php bin/console doctrine:migrations:migrate --env=prod --no-interaction --no-debug 2>&1 || true
            # Restaurar permisos
            chmod -R 775 var/cache var/log 2>&1 || true
            # Reset OPcache + reiniciar servei web
            php -r "opcache_reset();" 2>&1 || true
            sudo systemctl reload apache2 2>&1 || sudo service apache2 reload 2>&1 || true
            # Forçar recàrrega PHP-FPM si existeix
            sudo systemctl reload php8.3-fpm 2>&1 || sudo systemctl reload php8.2-fpm 2>&1 || sudo systemctl reload php8.1-fpm 2>&1 || true
