# VoraCMS — OpenSpec Configuration
# Auto-generated by sdd-init (hybrid mode)
# Date: 2026-07-10

context: |
  VoraCMS is a headless multi-tenant CMS built with Symfony 7.2, PHP 8.2+,
  Doctrine ORM 3.6, MariaDB/MySQL, Twig, and vanilla JS ES6+. It exposes a
  REST API consumed by external frontends (Astro, Next.js, React, vanilla).
  JWT authentication via LexikJWTAuthenticationBundle. Admin panel rendered
  server-side with Twig + vanilla JS. Frontend styling uses BEM CSS with
  corporate-neon design system (see styles.md). Documentation in Catalan.

  Project conventions: HTML5 semantic, zero inline CSS/JS, GSAP for admin
  animations, CSS custom properties for all design tokens, fluid typography
  with clamp(), 8px spacing scale, mobile-first responsive, WCAG AA contrast.
  No frontend framework — vanilla JS ES6+ modules.

  Current work focuses on admin panel: date-range fields, roles/permissions,
  status toggles redesign, and JWT auth support (branch: f-jwt).

